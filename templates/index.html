<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SPARK AI</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a0a; color:#00ff88; font-family:'Courier New',monospace; height:100vh; display:flex; flex-direction:column; }
        header { text-align:center; padding:16px; border-bottom:1px solid #00ff8833; flex-shrink:0; }
        header h1 { font-size:1.8rem; letter-spacing:10px; }
        header p  { color:#444; font-size:0.75rem; letter-spacing:4px; margin-top:4px; }
        #status-bar { text-align:center; padding:6px; font-size:0.75rem; letter-spacing:3px; background:#0f0f0f; border-bottom:1px solid #00ff8822; }
        #chat { flex:1; overflow-y:auto; padding:20px; }
        .user-msg  { text-align:right;  margin:10px 0; }
        .spark-msg { text-align:left;   margin:10px 0; }
        .user-msg span {
            background:#00ff8818; border:1px solid #00ff8840;
            padding:10px 16px; border-radius:18px 18px 0 18px;
            display:inline-block; max-width:72%; word-break:break-word;
        }
        .spark-msg span {
            background:#111; border:1px solid #00ff8833;
            padding:10px 16px; border-radius:18px 18px 18px 0;
            display:inline-block; max-width:72%; color:#00ff88; word-break:break-word;
        }
        .label { font-size:0.68rem; color:#444; margin:3px 6px; }
        #controls {
            display:flex; gap:8px; padding:12px 16px; flex-wrap:wrap;
            border-top:1px solid #00ff8822; background:#0a0a0a; flex-shrink:0;
        }
        #cmd-input {
            flex:1; min-width:180px; background:#111; border:1px solid #00ff8840;
            color:#00ff88; padding:10px 14px; border-radius:8px;
            font-family:'Courier New',monospace; font-size:0.95rem; outline:none;
        }
        button {
            background:#00ff8815; color:#00ff88; border:1px solid #00ff8840;
            padding:10px 16px; border-radius:8px; cursor:pointer;
            font-family:'Courier New',monospace; font-size:0.85rem; transition:0.2s;
            white-space:nowrap;
        }
        button:hover  { background:#00ff8830; }
        button.active { background:#00ff8840; border-color:#00ff88; }
        #screen-area { padding:10px 16px; border-top:1px solid #00ff8818; background:#0a0a0a; flex-shrink:0; }
        #screen-row  { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        #analyze-input {
            flex:1; min-width:160px; background:#111; border:1px solid #00ff8840;
            color:#00ff88; padding:8px 12px; border-radius:8px;
            font-family:'Courier New',monospace; outline:none;
        }
        #screenshot-img { width:100%; max-height:200px; object-fit:contain; border-radius:8px; margin-top:8px; border:1px solid #00ff8822; display:none; }
        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-thumb { background:#00ff8833; border-radius:3px; }
    </style>
</head>
<body>

<header>
    <h1>⚡ S.P.A.R.K.</h1>
    <p>Smart Personal Assistant with Real-time Knowledge · Built by Tanush Bhatt</p>
</header>

<div id="status-bar" id="status">● SPARK ONLINE</div>

<div id="chat">
    {% for msg in history %}
        {% if msg.role == "user" %}
            <div class="user-msg"><div class="label">You</div><span>{{ msg.text }}</span></div>
        {% else %}
            <div class="spark-msg"><div class="label">⚡ SPARK</div><span>{{ msg.text }}</span></div>
        {% endif %}
    {% endfor %}
</div>

<div id="controls">
    <input id="cmd-input" type="text" placeholder="Type a command..."
        onkeydown="if(event.key==='Enter') sendCommand()" />
    <button onclick="sendCommand()">⚡ SEND</button>
    <button onclick="voiceCommand()" id="voice-btn">🎤 VOICE</button>
    <button onclick="wakeUp()">☀️ WAKE</button>
    <button onclick="sleepSpark()">🌙 SLEEP</button>
    <button onclick="captureScreen()">📸 SCREEN</button>
    <button onclick="stopSpeaking()">🔇 STOP</button>
</div>

<div id="screen-area">
    <div id="screen-row">
        <input id="analyze-input" type="text" placeholder="Ask about your screen..." />
        <button onclick="analyzeScreen()">🔍 ANALYZE</button>
    </div>
    <img id="screenshot-img" src="" />
</div>

<script>
    // ── Browser Voice ──
    const synth = window.speechSynthesis;

    function sparkSpeak(text) {
        synth.cancel();  // stop any current speech
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate   = 1.1;
        utter.pitch  = 1;
        utter.volume = 1;

        // Pick a good voice
        const voices = synth.getVoices();
        const preferred = voices.find(v =>
            v.name.includes("Google UK English Female") ||
            v.name.includes("Microsoft Zira") ||
            v.name.includes("Female") ||
            v.lang === "en-US"
        );
        if (preferred) utter.voice = preferred;
        synth.speak(utter);
    }

    // Load voices (Chrome needs this)
    window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
    };

    const statusBar = document.getElementById('status-bar');
    function setStatus(msg) { statusBar.innerText = msg; }

    function addMsg(role, text) {
        const chat = document.getElementById('chat');
        const d    = document.createElement('div');
        d.className = role === 'user' ? 'user-msg' : 'spark-msg';
        const label = role === 'user' ? 'You' : '⚡ SPARK';
        d.innerHTML = `<div class="label">${label}</div><span>${text}</span>`;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    async function sendCommand() {
        const input = document.getElementById('cmd-input');
        const cmd   = input.value.trim();
        if (!cmd) return;
        addMsg('user', cmd);
        input.value = '';
        setStatus('⚡ Processing...');
        try {
            const res  = await fetch('/command', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({command: cmd})
            });
            const data = await res.json();
            addMsg('spark', data.response);
            sparkSpeak(data.response);  // ← browser speaks
        } catch { addMsg('spark', 'Error.'); }
        setStatus('● SPARK ONLINE');
    }

    async function voiceCommand() {
        const btn = document.getElementById('voice-btn');
        btn.innerText = '🔴 Listening...';
        btn.classList.add('active');
        setStatus('🎤 Listening...');
        try {
            const res  = await fetch('/voice', { method: 'POST' });
            const data = await res.json();
            if (data.command) {
                addMsg('user',  data.command);
                addMsg('spark', data.response);
                sparkSpeak(data.response);  // ← browser speaks
            } else {
                addMsg('spark', "Couldn't hear anything.");
                sparkSpeak("Couldn't hear anything.");
            }
        } catch { addMsg('spark', 'Voice error.'); }
        btn.innerText = '🎤 VOICE';
        btn.classList.remove('active');
        setStatus('● SPARK ONLINE');
    }

    async function captureScreen() {
        setStatus('📸 Capturing...');
        try {
            const res  = await fetch('/screenshot', { method: 'POST' });
            const data = await res.json();
            const img  = document.getElementById('screenshot-img');
            img.src    = 'data:image/png;base64,' + data.screenshot;
            img.style.display = 'block';
            const msg = 'Screenshot captured. Ask me anything about it.';
            addMsg('spark', msg);
            sparkSpeak(msg);  // ← browser speaks
        } catch { addMsg('spark', 'Screenshot failed.'); }
        setStatus('● SPARK ONLINE');
    }

    async function analyzeScreen() {
        const q = document.getElementById('analyze-input').value.trim()
                  || "What is on this screen?";
        addMsg('user', `[Screen] ${q}`);
        setStatus('🔍 Analyzing...');
        try {
            const res  = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: q})
            });
            const data = await res.json();
            addMsg('spark', data.response);
            sparkSpeak(data.response);  // ← browser speaks
        } catch { addMsg('spark', 'Analysis failed.'); }
        setStatus('● SPARK ONLINE');
    }

    async function wakeUp() {
        setStatus('☀️ Waking up...');
        await fetch('/wake', { method: 'POST' });
        const msg = 'SPARK is now awake!';
        addMsg('spark', msg);
        sparkSpeak(msg);
        setStatus('● SPARK ONLINE');
    }

    async function sleepSpark() {
        synth.cancel();  // stop speech
        await fetch('/sleep', { method: 'POST' });
        const msg = 'SPARK is sleeping. Double clap to wake.';
        addMsg('spark', msg);
        setStatus('🌙 SPARK SLEEPING');
    }

    // Stop voice button
    function stopSpeaking() {
        synth.cancel();
        setStatus('● SPARK ONLINE');
    }

    setInterval(async () => {
        try {
            const res  = await fetch('/status');
            const data = await res.json();
            if (!data.awake) setStatus('🌙 SPARK SLEEPING');
            else setStatus('● SPARK ONLINE');
        } catch {}
    }, 3000);
</script>
</body>
</html>
